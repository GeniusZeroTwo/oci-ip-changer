<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCI 客户授权管理系统</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f6f8; margin: 0; padding: 20px;}
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { margin-top: 0; color: #333; text-align: center; border-bottom: 2px solid #eee; padding-bottom: 15px;}
        .group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        input[type="text"], input[type="password"], input[type="number"], select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        select { background-color: #fff; cursor: pointer; margin-bottom: 10px; }
        button { background-color: #0d6efd; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s;}
        button:hover { background-color: #0b5ed7; }
        button:disabled { background-color: #a5c8fd; cursor: not-allowed; }
        button.btn-secondary { background-color: #6c757d; margin-top: 10px; }
        button.btn-secondary:hover { background-color: #5a6268; }
        button.btn-warning { background-color: #ffc107; color: #000; margin-bottom: 15px;}
        .server-list { background: #f8f9fa; padding: 15px; border-radius: 6px; border: 1px solid #dee2e6; max-height: 300px; overflow-y: auto; margin-bottom: 20px;}
        .server-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .server-item:last-child { border-bottom: none; }
        .server-item input[type="checkbox"] { width: 20px; height: 20px; margin-right: 15px; cursor: pointer;}
        .hidden { display: none; }
        #msg, #loginMsg { text-align: center; font-weight: bold; margin-top: 15px; min-height: 20px;}
        .success { color: #198754; } .error { color: #dc3545; }
        .used-info { font-size: 14px; font-weight: bold; color: #198754; margin-top: 5px; display: inline-block; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container" id="loginArea">
    <h2>后台安全登录</h2>
    <div style="text-align: center; margin-bottom: 20px; color: #666; font-size: 14px;">
        点击按钮获取动态验证码。系统将自动发送至配置绑定的唯一管理员 Telegram。
    </div>
    <button id="sendAdminCodeBtn" class="btn-secondary" style="margin-top: 0; margin-bottom: 20px;" onclick="sendAdminCode()">一键获取 TG 验证码</button>
    <div class="group">
        <label>动态验证码 (有效期 1 小时)</label>
        <input type="number" id="adminCode" placeholder="输入接收到的 6 位数字">
    </div>
    <button onclick="login()">登 录 控制台</button>
    <div id="loginMsg"></div>
</div>

<div class="container hidden" id="dashboardArea">
    <h2>🛡️ OCI 授权与额度分配</h2>
    
    <button class="btn-warning" onclick="syncServers()">🔄 从甲骨文云同步最新服务器列表</button>
    
    <div class="group">
        <label>目标客户的 Telegram ID</label>
        <select id="existingUserSelect" onchange="selectExistingUser()">
            <option value="">-- 从已保存的客户中选择 (更新老客户) --</option>
        </select>
        <div style="display: flex; gap: 10px;">
            <input type="number" id="targetTgId" placeholder="手动输入新客户ID (添加新客户)">
            <button style="background-color: #6c757d; width: 120px; padding: 0;" onclick="loadUserPerms()">读取信息</button>
        </div>
    </div>
    
    <div class="group">
        <label>
            额度管理 
            <span class="used-info" id="quotaDisplay">(当前剩余：0 次 | 总分配：0 | 已用：0)</span>
        </label>
        
        <input type="hidden" id="maxChangesInput" value="0">
        
        <div style="display: flex; gap: 8px; margin-top: 10px; align-items: center;">
            <button type="button" style="background-color: #0dcaf0; color: #000; padding: 8px 12px; width: auto;" onclick="addTimes(1)">+1 次</button>
            <button type="button" style="background-color: #0dcaf0; color: #000; padding: 8px 12px; width: auto;" onclick="addTimes(5)">+5 次</button>
            <button type="button" style="background-color: #0dcaf0; color: #000; padding: 8px 12px; width: auto;" onclick="addTimes(10)">+10 次</button>
            <input type="number" id="customAddInput" placeholder="填写数值" style="padding: 8px; margin: 0; width: 100px;">
            <button type="button" style="background-color: #17a2b8; padding: 8px; width: auto;" onclick="addCustomTimes()">➕ 叠加充值</button>
        </div>
        <div style="font-size: 12px; color: #888; margin-top: 8px;">💡 提示：点击按钮直接为客户叠加剩余额度 (填负数可扣除)。操作后请记得点击底部【保存更新】。</div>
    </div>

    <label>授权可操作的服务器 (可多选)</label>
    <div class="server-list" id="serverList"></div>

    <button id="saveBtn" style="background-color: #198754;" onclick="savePermissions()">💾 保存更新</button>
    <div id="sysMsg"></div>
</div>

<script>
    let globalServers = {};
    let globalPerms = {};
    let sessionCode = '';

    function showMsg(id, text, isSuccess) {
        const el = document.getElementById(id);
        el.innerText = text;
        el.className = isSuccess ? 'success' : 'error';
        setTimeout(() => el.innerText = '', 4000);
    }

    async function sendAdminCode() {
        const btn = document.getElementById('sendAdminCodeBtn');
        btn.disabled = true; btn.innerText = "发送中...";
        
        try {
            const res = await fetch('/api/admin/send-code', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({}) // 不再向后端传递 ID，完全由后端读取配置
            });
            const data = await res.json();
            
            if(data.success) {
                showMsg('loginMsg', '验证码已发送至管理员的 Telegram！', true);
                let count = 60;
                const timer = setInterval(() => {
                    btn.innerText = `${count} 秒后重试`; count--;
                    if(count < 0) { clearInterval(timer); btn.disabled = false; btn.innerText = "获取 TG 验证码"; }
                }, 1000);
            } else {
                showMsg('loginMsg', data.error, false);
                btn.disabled = false; btn.innerText = "获取 TG 验证码";
            }
        } catch(e) {
            showMsg('loginMsg', '网络请求失败', false);
            btn.disabled = false; btn.innerText = "获取 TG 验证码";
        }
    }

    async function login() {
        const code = document.getElementById('adminCode').value;
        if(!code) { return showMsg('loginMsg', '请输入验证码', false); }
        
        const res = await fetch('/api/admin/data', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({code: code})
        });
        const data = await res.json();
        
        if(data.success) {
            sessionCode = code;
            globalServers = data.servers;
            globalPerms = data.permissions;
            document.getElementById('loginArea').classList.add('hidden');
            document.getElementById('dashboardArea').classList.remove('hidden');
            
            updateUserDropdown();
            renderServerList();
        } else {
            showMsg('loginMsg', data.error || '验证失败', false);
        }
    }

    async function syncServers() {
        showMsg('sysMsg', '正在向甲骨文云请求数据...', true);
        const res = await fetch('/api/admin/sync', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({code: sessionCode})
        });
        const data = await res.json();
        if(data.success) {
            globalServers = data.servers;
            renderServerList();
            showMsg('sysMsg', '列表同步成功！', true);
        } else {
            showMsg('sysMsg', '同步失败：' + data.message, false);
        }
    }

    function updateUserDropdown() {
        const select = document.getElementById('existingUserSelect');
        select.innerHTML = '<option value="">-- 从已保存的客户中选择 (更新老客户) --</option>';
        
        for (const tgId in globalPerms) {
            const used = globalPerms[tgId].used_changes || 0;
            const max = globalPerms[tgId].max_changes || 0;
            const remaining = max - used;
            select.innerHTML += `<option value="${tgId}">客户: ${tgId} (剩余额度: ${remaining > 0 ? remaining : 0} 次)</option>`;
        }
    }

    function selectExistingUser() {
        const select = document.getElementById('existingUserSelect');
        const input = document.getElementById('targetTgId');
        if (select.value) {
            input.value = select.value;
            loadUserPerms(); 
        }
    }

    function renderServerList(checkedOcids = []) {
        const listDiv = document.getElementById('serverList');
        listDiv.innerHTML = '';
        
        if (Object.keys(globalServers).length === 0) {
            listDiv.innerHTML = '<div style="color:#777; text-align:center;">暂无服务器，请点击上方同步按钮。</div>';
            return;
        }

        for (const [name, ocid] of Object.entries(globalServers)) {
            const isChecked = checkedOcids.includes(ocid) ? 'checked' : '';
            listDiv.innerHTML += `
                <div class="server-item">
                    <input type="checkbox" id="chk_${ocid}" value="${ocid}" ${isChecked}>
                    <label style="margin:0; cursor:pointer;" for="chk_${ocid}">${name}</label>
                </div>
            `;
        }
    }

    function renderQuotaDisplay(max, used) {
        const rem = max - used;
        const displayRem = rem > 0 ? rem : 0;
        document.getElementById('quotaDisplay').innerText = `(当前剩余：${displayRem} 次 | 总分配：${max} | 已用：${used})`;
    }

    function loadUserPerms() {
        const tgId = document.getElementById('targetTgId').value;
        if(!tgId) return;
        
        let userData = globalPerms[tgId];
        if (userData) {
            document.getElementById('maxChangesInput').value = userData.max_changes;
            renderQuotaDisplay(userData.max_changes, userData.used_changes);
            renderServerList(userData.ocids);
            showMsg('sysMsg', `已成功加载老客户 ${tgId} 的配置`, true);
        } else {
            document.getElementById('maxChangesInput').value = 0;
            renderQuotaDisplay(0, 0);
            renderServerList([]);
            showMsg('sysMsg', `这是一个新客户，请配置权限后点击保存`, true);
        }
    }

    function addTimes(amount) {
        const input = document.getElementById('maxChangesInput');
        let currentMax = parseInt(input.value) || 0;
        let newMax = currentMax + amount;
        
        if (newMax < 0) newMax = 0;
        input.value = newMax;
        
        const tgId = document.getElementById('targetTgId').value;
        let used = 0;
        if (tgId && globalPerms[tgId]) {
            used = globalPerms[tgId].used_changes || 0;
        }
        
        renderQuotaDisplay(newMax, used);
        
        const display = document.getElementById('quotaDisplay');
        display.style.transition = 'background-color 0.3s';
        display.style.backgroundColor = '#d1e7dd';
        setTimeout(() => display.style.backgroundColor = 'transparent', 400);
    }

    function addCustomTimes() {
        const addInput = document.getElementById('customAddInput');
        const amount = parseInt(addInput.value);
        if (!isNaN(amount)) {
            addTimes(amount);
            addInput.value = ''; 
        } else {
            showMsg('sysMsg', '请输入有效的数值', false);
        }
    }

    async function savePermissions() {
        const tgIdInput = document.getElementById('targetTgId');
        const tgId = tgIdInput.value.trim();
        if(!tgId) return showMsg('sysMsg', '错误：Telegram ID 不能为空', false);

        const maxChanges = parseInt(document.getElementById('maxChangesInput').value) || 0;
        const selectedOcids = Array.from(document.querySelectorAll('.server-list input:checked')).map(cb => cb.value);

        const btn = document.getElementById('saveBtn');
        btn.disabled = true;
        btn.innerText = "正在保存...";

        try {
            const res = await fetch('/api/admin/save', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    code: sessionCode,
                    tg_id: tgId,
                    ocids: selectedOcids,
                    max_changes: maxChanges
                })
            });
            const data = await res.json();
            
            if(data.success) {
                const isUpdate = !!globalPerms[tgId];
                const usedChanges = isUpdate ? globalPerms[tgId].used_changes : 0;
                
                globalPerms[tgId] = { 
                    ocids: selectedOcids, 
                    max_changes: maxChanges, 
                    used_changes: usedChanges 
                };
                
                updateUserDropdown(); 
                document.getElementById('existingUserSelect').value = tgId;

                showMsg('sysMsg', isUpdate ? '✅ 客户数据更新成功！' : '✅ 新客户授权成功！', true);
            } else {
                showMsg('sysMsg', '❌ 保存失败: ' + data.error, false);
            }
        } catch (e) {
            showMsg('sysMsg', '❌ 网络错误，无法连接服务器', false);
        } finally {
            btn.disabled = false;
            btn.innerText = "💾 保存更新";
        }
    }
</script>
</body>
</html>
